# LLM Provider 预设配置
# 可通过环境变量覆盖任何值

moonshot:
  name: "Moonshot AI (Kimi)"
  api_key_env: "LLM_API_KEY"
  base_url: "https://api.moonshot.cn/v1"
  models:
    k2-turbo: "kimi-k2-turbo-preview"
    k2: "kimi-k2-0711-preview"
    k1.5: "kimi-k1.5-long"

doubao:
  name: "Doubao (Volcengine)"
  api_key_env: "ARK_API_KEY"
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  models:
    seed-2-0-pro: "doubao-seed-2-0-pro-260215"
    seed-1-6: "doubao-seed-1-6-250615"
    pro-1-5: "doubao-pro-1-5-250328"
    lite-1-5: "doubao-lite-1-5-250328"
    vision-1-5: "doubao-vision-1-5-250328"

openai:
  name: "OpenAI"
  api_key_env: "OPENAI_API_KEY"
  base_url: "https://api.openai.com/v1"
  models:
    gpt-4o: "gpt-4o"
    gpt-4o-mini: "gpt-4o-mini"
